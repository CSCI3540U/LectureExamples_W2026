<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Account Settings — CorpNet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #1a1a2e;
      margin: 0;
    }
    header {
      background: #2563eb;
      color: #fff;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: 1px; }
    header .tagline { font-size: 0.8rem; opacity: 0.75; }
    .badge {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .container { max-width: 680px; margin: 40px auto; padding: 0 24px; }
    h1 { font-size: 1.4rem; margin-bottom: 24px; color: #1e293b; }
    .section {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin: 0 0 16px;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 10px;
    }
    .field { display: flex; align-items: center; margin-bottom: 14px; }
    .field label {
      width: 140px;
      font-size: 0.85rem;
      color: #64748b;
      flex-shrink: 0;
    }
    .field .value { font-size: 0.9rem; color: #1e293b; }
    .divider { border: none; border-top: 1px solid #f1f5f9; margin: 20px 0; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type=text] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #1e293b;
      background: #f8fafc;
    }
    input[type=text]:focus {
      outline: none;
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    button[type=submit] {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 9px 20px;
      border-radius: 6px;
      font-size: 0.88rem;
      cursor: pointer;
      font-weight: 500;
    }
    button[type=submit]:hover { background: #1d4ed8; }
    .alert-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">&#x1F3E2; CorpNet</div>
    <div class="tagline">Internal Employee Portal</div>
  </div>
  <span class="badge">&#x1F464; Logged in as victim_user</span>
</header>

<div class="container">
  <h1>Account Settings</h1>

  <div class="section">
    <h2>Profile</h2>
    <div class="field">
      <label>Username</label>
      <span class="value">victim_user</span>
    </div>
    <div class="field">
      <label>Email</label>
      <span class="value" id="current-email">{{ email }}</span>
    </div>
    <div class="field">
      <label>Member since</label>
      <span class="value">2023-03-14</span>
    </div>
    <div class="field">
      <label>Account type</label>
      <span class="value">Standard</span>
    </div>
  </div>

  <div class="section">
    <h2>Change Email Address</h2>
    <form method="post" action="/csrf/challenge/update">
      <div class="form-group">
        <label for="email">New email address</label>
        <input type="text" id="email" name="email" value="{{ email }}"
               placeholder="Enter new email address">
      </div>
      <button type="submit">Save Changes</button>
    </form>
  </div>

</div>
</body>
</html>
